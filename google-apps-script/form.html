<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="https://dcmentor.github.io/webinair/assets/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="https://dcmentor.github.io/webinair/assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="https://dcmentor.github.io/webinair/assets/favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="https://dcmentor.github.io/webinair/assets/apple-touch-icon.png" />
  <title>Contact Form</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1a1a2e;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #059669;
      --error: #dc2626;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: linear-gradient(160deg, #eef2ff 0%, var(--bg) 45%, #f8fafc 100%);
      color: var(--text);
      padding: 24px 16px;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .brand-logo {
      display: block;
      height: 36px;
      width: auto;
    }

    .brand-tag {
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.75rem;
      line-height: 1.2;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.875rem;
      font-weight: 600;
    }

    .required {
      color: var(--error);
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font: inherit;
      background: #fff;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .actions {
      margin-top: 20px;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 600;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
      transition: background 0.15s ease, transform 0.05s ease;
    }

    button:hover:not(:disabled) {
      background: var(--primary-hover);
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .status {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 0.9rem;
      display: none;
    }

    .status.show {
      display: block;
    }

    .status.success {
      background: #ecfdf5;
      color: var(--success);
      border: 1px solid #a7f3d0;
    }

    .status.error {
      background: #fef2f2;
      color: var(--error);
      border: 1px solid #fecaca;
    }

    .hint {
      margin-top: 18px;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <img src="https://dcmentor.github.io/webinair/assets/logo-icon.png" alt="Direct Channel" class="brand-logo" />
      </div>
    <div class="card">
      <h1>Contact Form</h1>
      <p class="subtitle">Submit the form below. Your response will be saved to our shared spreadsheet.</p>

      <form id="contactForm" novalidate>
        <div class="field">
          <label for="name">Name <span class="required">*</span></label>
          <input id="name" name="name" type="text" autocomplete="name" required />
        </div>

        <div class="field">
          <label for="email">Email <span class="required">*</span></label>
          <input id="email" name="email" type="email" autocomplete="email" required />
        </div>

        <div class="field">
          <label for="phone">Phone</label>
          <input id="phone" name="phone" type="tel" autocomplete="tel" />
        </div>

        <div class="field">
          <label for="subject">Subject</label>
          <select id="subject" name="subject">
            <option value="">Select a subject</option>
            <option value="General inquiry">General inquiry</option>
            <option value="Support">Support</option>
            <option value="Partnership">Partnership</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="field">
          <label for="message">Message <span class="required">*</span></label>
          <textarea id="message" name="message" required></textarea>
        </div>

        <div class="actions">
          <button id="submitBtn" type="submit">Send</button>
        </div>
      </form>

      <div id="status" class="status" role="status" aria-live="polite"></div>
      <p class="hint">Fields marked with * are required.</p>
    </div>
  </div>

  <script>
    var form = document.getElementById('contactForm');
    var submitBtn = document.getElementById('submitBtn');
    var statusEl = document.getElementById('status');

    function showStatus(type, message) {
      statusEl.className = 'status show ' + type;
      statusEl.textContent = message;
    }

    function clearStatus() {
      statusEl.className = 'status';
      statusEl.textContent = '';
    }

    function getPayload() {
      return {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        subject: document.getElementById('subject').value,
        message: document.getElementById('message').value
      };
    }

    form.addEventListener('submit', function (event) {
      event.preventDefault();
      clearStatus();

      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      google.script.run
        .withSuccessHandler(function () {
          form.reset();
          showStatus('success', 'Thank you! Your submission was saved successfully.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Send';
        })
        .withFailureHandler(function (error) {
          var message = (error && error.message) ? error.message : 'Something went wrong. Please try again.';
          showStatus('error', message);
          submitBtn.disabled = false;
          submitBtn.textContent = 'Send';
        })
        .submitForm(getPayload());
    });
  </script>
</body>
</html>
